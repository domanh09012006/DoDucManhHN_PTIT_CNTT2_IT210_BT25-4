<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title th:text="#{title}">Todo</title>

        <link rel="stylesheet"
              href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    </head>

    <body class="container mt-4">

        <div class="text-right mb-2">
            <a href="?lang=vi" class="btn btn-sm btn-outline-primary">VI</a>
            <a href="?lang=en" class="btn btn-sm btn-outline-secondary">EN</a>
        </div>

        <h2 th:text="#{title}"></h2>
        <h5 class="text-muted">
            Danh sách của:
            <span th:text="${ownerName}"></span>
        </h5>

        <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

        <hr>

        <table class="table table-bordered table-hover">
            <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th th:text="#{content}"></th>
                    <th th:text="#{date}"></th>
                    <th th:text="#{status}"></th>
                    <th th:text="#{priority}"></th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="t : ${todos}">
                    <td th:text="${t.id}"></td>
                    <td th:text="${t.content}"></td>
                    <td th:text="${t.dueDate}"></td>

                    <td>
            <span th:text="${t.status}"
                  th:classappend="${t.status == 'DONE'} ? 'badge badge-success' : 'badge badge-warning'">
            </span>
                    </td>

                    <td>
            <span th:text="${t.priority}"
                  th:classappend="${t.priority == 'HIGH'} ? 'badge badge-danger' : 'badge badge-info'">
            </span>
                    </td>

                    <td>
                        <a th:href="@{/edit/{id}(id=${t.id})}"
                           class="btn btn-sm btn-warning"
                           th:text="#{edit}"></a>

                        <a th:href="@{/delete/{id}(id=${t.id})}"
                           class="btn btn-sm btn-danger"
                           th:text="#{delete}"
                           onclick="return confirm('Delete?')"></a>
                    </td>
                </tr>
            </tbody>
        </table>

        <hr>

        <h4 th:text="#{add}"></h4>

        <form th:action="@{/update}" method="post" th:object="${todo}">

            <div class="form-group">
                <label th:text="#{content}"></label>
                <input type="text" class="form-control" th:field="*{content}">
                <small class="text-danger" th:errors="*{content}"></small>
            </div>
            <div class="form-group">
                <label th:text="#{date}"></label>
                <input type="date" class="form-control" th:field="*{dueDate}">
                <small class="text-danger" th:errors="*{dueDate}"></small>
            </div>
            <div class="form-group">
                <label th:text="#{status}"></label>
                <select class="form-control" th:field="*{status}">
                    <option value="PENDING">PENDING</option>
                    <option value="DONE">DONE</option>
                </select>
            </div>
            <div class="form-group">
                <label th:text="#{priority}"></label>
                <select class="form-control" th:field="*{priority}">
                    <option value="LOW">LOW</option>
                    <option value="HIGH">HIGH</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary" th:text="#{add}"></button>
        </form>

    </body>
</html>
